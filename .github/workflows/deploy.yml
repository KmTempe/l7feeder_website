name: Deploy to Vercel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate IndexNow Key File
        run: |
          $key = "${{ secrets.INDEXNOW_KEY }}"
          $fileName = "$($key).txt"
          New-Item -ItemType File -Path "public/$fileName" -Force | Out-Null
          $key | Out-File -FilePath "public/$fileName" -Encoding UTF8 -NoNewline
          Write-Host "Generated: public/$fileName"
        shell: pwsh

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: vercel/actions/deploy-production@v21
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
