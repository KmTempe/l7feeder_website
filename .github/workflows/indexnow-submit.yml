# =====================================================================
# IndexNow Submission Workflow
# =====================================================================
# This workflow submits your portfolio URLs to IndexNow (Bing/Google)
# after every deployment to Vercel.
#
# Triggers:
#   - After successful deployment (waits for previous workflow)
#   - Manual trigger via workflow_dispatch
#
# What it does:
#   1. Waits for Vercel deployment to complete
#   2. Submits URLs to Bing IndexNow
#   3. Submits URLs to Google IndexNow
#   4. Logs results for monitoring
# =====================================================================

name: IndexNow URL Submission

on:
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types:
      - completed
  
  workflow_dispatch:

jobs:
  submit-indexnow:
    # IMPORTANT: Only run if Deploy to Vercel succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================================
      # Wait for Vercel Deployment
      # =====================================================================
      # Give Vercel 30 seconds to fully deploy and stabilize the site
      # This ensures the key file is accessible when we submit
      
      - name: Wait for Vercel Deployment
        run: |
          Write-Host "Waiting 30 seconds for Vercel deployment to stabilize..."
          Start-Sleep -Seconds 30
        shell: pwsh

      # =====================================================================
      # Verify IndexNow Key File is Accessible
      # =====================================================================
      # Retry up to 5 times to ensure the key file is live
      # Each retry waits 5 seconds to avoid rate limiting
      
      - name: Verify IndexNow Key File
        run: |
          $key = "${{ secrets.INDEXNOW_KEY }}"
          $keyUrl = "https://l7feeders.dev/$key.txt"
          $maxRetries = 5
          $retryCount = 0
          
          Write-Host "Checking if key file is accessible..."
          Write-Host "URL: $keyUrl"
          
          while ($retryCount -lt $maxRetries) {
            try {
              $response = Invoke-WebRequest `
                -Uri $keyUrl `
                -ErrorAction Stop `
                -TimeoutSec 10
              
              Write-Host "✓ Key file is accessible (Status: $($response.StatusCode))"
              Write-Host "Content length: $($response.Content.Length) bytes"
              exit 0
            } catch {
              $retryCount++
              Write-Host "Attempt $retryCount/$maxRetries failed. Retrying in 5 seconds..."
              Write-Host "Error: $($_.Exception.Message)"
              Start-Sleep -Seconds 5
            }
          }
          
          Write-Host "✗ Key file still not accessible after $maxRetries attempts!"
          Write-Host "Continuing with submission anyway (IndexNow will verify)..."
        shell: pwsh

      # =====================================================================
      # Submit URLs to Bing IndexNow
      # =====================================================================
      # Sends the URLs to Bing's IndexNow endpoint
      # Bing automatically shares submissions with other search engines
      
      - name: Submit to Bing IndexNow
        id: bing-submit
        run: |
          $key = "${{ secrets.INDEXNOW_KEY }}"
          $domain = "https://l7feeders.dev"
          
          # Array of URLs to submit
          $urls = @(
            "$domain",
            "$domain/"
          )
          
          # Create JSON payload
          $payload = @{
            host = "l7feeders.dev"
            key = $key
            keyLocation = "$domain/$key.txt"
            urlList = $urls
          } | ConvertTo-Json
          
          Write-Host "=========================================="
          Write-Host "Submitting to Bing IndexNow"
          Write-Host "=========================================="
          Write-Host "Domain: l7feeders.dev"
          Write-Host "URLs: $($urls.Count)"
          Write-Host "Key Location: $domain/$key.txt"
          
          try {
            $response = Invoke-WebRequest `
              -Uri "https://www.bing.com/indexnow" `
              -Method POST `
              -ContentType "application/json; charset=utf-8" `
              -Body $payload `
              -ErrorAction Stop `
              -TimeoutSec 30
            
            Write-Host "Response Status: $($response.StatusCode)"
            
            if ($response.StatusCode -eq 200) {
              Write-Host "✓ Successfully submitted to Bing IndexNow!"
              echo "bing_success=true" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "⚠ Unexpected response status: $($response.StatusCode)"
              echo "bing_success=false" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Host "✗ Failed to submit to Bing IndexNow"
            Write-Host "Error: $($_.Exception.Message)"
            echo "bing_success=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      # =====================================================================
      # Submit URLs to Google IndexNow
      # =====================================================================
      # Google also supports IndexNow protocol
      
      - name: Submit to Google IndexNow
        id: google-submit
        run: |
          $key = "${{ secrets.INDEXNOW_KEY }}"
          $domain = "https://l7feeders.dev"
          
          $urls = @(
            "$domain",
            "$domain/"
          )
          
          $payload = @{
            host = "l7feeders.dev"
            key = $key
            keyLocation = "$domain/$key.txt"
            urlList = $urls
          } | ConvertTo-Json
          
          Write-Host "=========================================="
          Write-Host "Submitting to Google IndexNow"
          Write-Host "=========================================="
          
          try {
            $response = Invoke-WebRequest `
              -Uri "https://www.google.com/indexnow" `
              -Method POST `
              -ContentType "application/json; charset=utf-8" `
              -Body $payload `
              -ErrorAction Stop `
              -TimeoutSec 30
            
            Write-Host "Response Status: $($response.StatusCode)"
            
            if ($response.StatusCode -eq 200) {
              Write-Host "✓ Successfully submitted to Google IndexNow!"
              echo "google_success=true" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "⚠ Unexpected response status: $($response.StatusCode)"
              echo "google_success=false" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Host "✗ Failed to submit to Google IndexNow"
            Write-Host "Error: $($_.Exception.Message)"
            echo "google_success=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      # =====================================================================
      # Summary Report
      # =====================================================================
      # Displays final submission results
      
      - name: Submission Summary
        if: always()
        run: |
          Write-Host "`n=========================================="
          Write-Host "IndexNow Submission Complete"
          Write-Host "=========================================="
          Write-Host "Bing Status: ${{ steps.bing-submit.outputs.bing_success }}"
          Write-Host "Google Status: ${{ steps.google-submit.outputs.google_success }}"
          Write-Host "Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host "=========================================="
        shell: pwsh
