# =====================================================================
# IndexNow URL Submission Workflow
# =====================================================================
# This workflow submits your portfolio URLs to IndexNow after every
# deployment to Vercel.
#
# Supported Search Engines (via IndexNow):
#   - Bing (Microsoft)
#   - Yandex
#   - Naver
#   - Seznam.cz
#
# Automatic URL Sharing:
#   When you submit to Bing, URLs are automatically shared with all
#   other participating search engines.
#
# Triggers:
#   - After successful deployment (waits for previous workflow)
#   - Manual trigger via workflow_dispatch
# =====================================================================

name: IndexNow URL Submission

on:
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types:
      - completed
  
  workflow_dispatch:

jobs:
  submit-indexnow:
    # Only run if Deploy to Vercel succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =====================================================================
      # Wait for Vercel Deployment to Stabilize
      # =====================================================================
      # Gives Vercel time to fully deploy and stabilize the site
      
      - name: Wait for Vercel Deployment
        run: |
          Write-Host "Waiting 60 seconds for Vercel deployment to stabilize..."
          Start-Sleep -Seconds 60
        shell: pwsh

      # =====================================================================
      # Verify IndexNow Key File (Optional - for logging)
      # =====================================================================
      # Attempts to verify key file is accessible
      # Continues even if verification fails (Bing will verify)
      
      - name: Verify IndexNow Key File
        run: |
          $key = "${{ secrets.INDEXNOW_KEY }}"
          $keyUrl = "https://l7feeders.dev/$key.txt"
          $maxRetries = 3
          $retryCount = 0
          
          # Browser-like headers to bypass rate limiting
          $headers = @{
            "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
            "Accept" = "text/plain"
          }
          
          Write-Host "Checking if key file is accessible..."
          Write-Host "URL: $keyUrl"
          
          while ($retryCount -lt $maxRetries) {
            try {
              $response = Invoke-WebRequest `
                -Uri $keyUrl `
                -Headers $headers `
                -ErrorAction Stop `
                -TimeoutSec 10 `
                -MaximumRetryCount 0
              
              Write-Host "✓ Key file is accessible (Status: $($response.StatusCode))"
              exit 0
            } catch {
              $retryCount++
              $waitTime = $retryCount * 5
              Write-Host "Attempt $retryCount/$maxRetries failed. Waiting ${waitTime}s..."
              Start-Sleep -Seconds $waitTime
            }
          }
          
          Write-Host "⚠ Key file verification skipped, continuing with submission..."
          Write-Host "  (Bing will verify ownership when processing)"
        shell: pwsh

      # =====================================================================
      # Submit URLs to Bing IndexNow
      # =====================================================================
      # Submits URLs to Bing's IndexNow endpoint
      #
      # HTTP 202 = Accepted (submission received)
      # Bing automatically shares with: Yandex, Naver, Seznam.cz
      # Google does NOT support IndexNow
      
      - name: Submit to Bing IndexNow
        id: bing-submit
        run: |
          $key = "${{ secrets.INDEXNOW_KEY }}"
          $domain = "https://l7feeders.dev"
          
          # URLs to submit
          $urls = @(
            "$domain",
            "$domain/"
          )
          
          # Create IndexNow JSON payload
          $payload = @{
            host = "l7feeders.dev"
            key = $key
            keyLocation = "$domain/$key.txt"
            urlList = $urls
          } | ConvertTo-Json
          
          # Browser-like headers
          $headers = @{
            "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            "Accept" = "application/json"
            "Accept-Language" = "en-US,en;q=0.9"
            "Accept-Encoding" = "gzip, deflate, br"
            "Origin" = "https://www.bing.com"
            "Connection" = "keep-alive"
          }
          
          Write-Host "=========================================="
          Write-Host "Submitting to Bing IndexNow"
          Write-Host "=========================================="
          Write-Host "Domain: l7feeders.dev"
          Write-Host "URLs: $($urls.Count)"
          Write-Host ""
          Write-Host "URLs submitted:"
          foreach ($url in $urls) {
            Write-Host "  • $url"
          }
          Write-Host ""
          Write-Host "Search Engines Notified:"
          Write-Host "  • Bing (Microsoft)"
          Write-Host "  • Yandex"
          Write-Host "  • Naver"
          Write-Host "  • Seznam.cz"
          
          try {
            $response = Invoke-WebRequest `
              -Uri "https://www.bing.com/indexnow" `
              -Method POST `
              -Headers $headers `
              -ContentType "application/json; charset=utf-8" `
              -Body $payload `
              -ErrorAction Stop `
              -TimeoutSec 30 `
              -MaximumRetryCount 0
            
            Write-Host ""
            Write-Host "Response Status: $($response.StatusCode)"
            
            # 200 and 202 are both success codes
            if ($response.StatusCode -eq 200 -or $response.StatusCode -eq 202) {
              Write-Host "✓ Successfully submitted to Bing IndexNow!"
              Write-Host "  Your URLs will appear in Bing and partner engines"
              echo "bing_success=true" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "⚠ Received response code: $($response.StatusCode)"
              echo "bing_success=false" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Host "✗ Failed to submit to Bing IndexNow"
            Write-Host "Error: $($_.Exception.Message)"
            echo "bing_success=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      # =====================================================================
      # Submission Summary
      # =====================================================================
      
      - name: Submission Summary
        if: always()
        run: |
          Write-Host "`n=========================================="
          Write-Host "IndexNow Submission Complete"
          Write-Host "=========================================="
          Write-Host "Bing Submission: ${{ steps.bing-submit.outputs.bing_success }}"
          Write-Host "Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host ""
          Write-Host "ℹ Google uses Google Search Console API"
          Write-Host "  (does not support IndexNow protocol)"
          Write-Host "=========================================="
        shell: pwsh
